<div class="fixed -top-32 -right-32 w-96 h-96 bg-secondary-fixed/10 rounded-full blur-3xl pointer-events-none"></div>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        // Handle Back Button
        document.getElementById('backBtn').addEventListener('click', () => {
            window.location.href = 'index.html';
        });

        // Handle specific skills selection
        const skillBtns = document.querySelectorAll('.skill-btn');
        const selectedSkills = new Set(['Programming', 'Data Science']);

        skillBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const text = e.currentTarget.innerText.trim();
                if (selectedSkills.has(text)) {
                    selectedSkills.delete(text);
                    e.currentTarget.className = 'skill-btn px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant font-label-sm text-label-sm hover:border-primary hover:text-primary transition-colors';
                } else {
                    selectedSkills.add(text);
                    e.currentTarget.className = 'skill-btn px-4 py-2 rounded-full border border-primary text-primary font-label-sm text-label-sm bg-primary/5 hover:bg-primary/10 transition-colors';
                }
            });
        });

        // Handle success metrics selection styling (radio buttons)
        const radios = document.querySelectorAll('input[name="success"]');
        radios.forEach(radio => {
            radio.addEventListener('change', () => {
                // Reset all to unselected style
                document.querySelectorAll('label:has(input[name="success"])').forEach(label => {
                    label.className = 'flex items-center gap-3 p-3 rounded-xl border border-outline-variant hover:border-primary cursor-pointer group transition-all';
                    label.querySelector('span').className = 'font-body-md text-on-surface-variant group-hover:text-primary transition-colors';
                });
                
                // Set selected style
                if (radio.checked) {
                    const label = radio.closest('label');
                    label.className = 'flex items-center gap-3 p-3 rounded-xl border border-primary bg-primary/5 cursor-pointer group transition-all';
                    label.querySelector('span').className = 'font-body-md text-primary font-semibold';
                }
            });
        });

        // Handle form submission
        document.getElementById('continueBtn').addEventListener('click', () => {
            const goals = document.getElementById('goals').value;
            
            let successMetric = '';
            radios.forEach(r => {
                if (r.checked) {
                    successMetric = r.nextElementSibling.innerText;
                }
            });

            const roadmapData = {
                goals,
                skills: Array.from(selectedSkills),
                successMetric
            };

            console.log('Roadmap Data:', roadmapData);
            
            // Retrieve previous data
            const prevData = JSON.parse(localStorage.getItem('studyBuddyUserData') || '{}');
            const finalData = { ...prevData, ...roadmapData };
            
            // Save locally for quick UI access
            localStorage.setItem('studyBuddyUserData', JSON.stringify(finalData));
            
            // Send to backend
            const userId = localStorage.getItem('studyBuddyUserId');
            if (userId) {
                fetch('/api/onboarding/step2', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId,
                        goals: roadmapData.goals,
                        skills: roadmapData.skills,
                        successMetric: roadmapData.successMetric
                    })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        window.location.href = 'step3.html';
                    } else {
                        alert('Error updating user profile');
                    }
                })
                .catch(err => {
                    console.error('Error:', err);
                    alert('Failed to connect to backend server');
                });
            } else {
                // If no userId, just proceed (fallback)
                window.location.href = 'step3.html';
            }
        });
    });
</script>
