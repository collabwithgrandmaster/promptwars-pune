<body class="vibrant-bg text-on-background font-body-md min-h-screen flex flex-col">
<!-- TopAppBar Component -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-4 max-w-7xl mx-auto bg-white/60 backdrop-blur-lg border-b border-white/20">
<div class="flex items-center gap-2">
<div class="w-10 h-10 rounded-xl bg-primary flex items-center justify-center text-on-primary shadow-lg shadow-primary/30">
<span class="material-symbols-outlined text-2xl" data-icon="school">school</span>
</div>
<span class="text-2xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-primary to-indigo-600">StudyBuddy AI</span>
</div>
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-white flex items-center justify-center border border-primary/20 shadow-sm hover:border-primary transition-colors cursor-pointer">
<span class="material-symbols-outlined text-primary" data-icon="account_circle">account_circle</span>
</div>
</div>
</header>
<main class="flex-grow pt-28 pb-12 px-6 max-w-3xl mx-auto w-full">
<!-- Progress Indicator -->
<div class="mb-12">
<div class="flex justify-between items-end mb-4">
<span class="font-title-sm text-title-sm text-primary flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-secondary animate-pulse"></span>
          Getting Started
        </span>
<span class="font-label-sm text-label-sm text-on-surface-variant bg-white px-3 py-1 rounded-full border border-outline-variant shadow-sm">Step 1 of 4</span>
</div>
<div class="h-4 w-full bg-slate-200 rounded-full overflow-hidden p-1 shadow-inner">
<div class="h-full bg-gradient-to-r from-primary via-indigo-500 to-secondary rounded-full w-1/4 transition-all duration-1000 ease-out"></div>
</div>
</div>
<!-- AI Hero Section -->
<section class="mb-12 flex flex-col md:flex-row items-center gap-8 bg-white/80 backdrop-blur-sm p-8 rounded-[2rem] soft-shadow border border-white">
<div class="relative">
<div class="w-28 h-28 rounded-full bg-gradient-to-br from-primary-container to-indigo-400 flex items-center justify-center p-1.5 shadow-2xl">
<div class="w-full h-full rounded-full border-4 border-white overflow-hidden bg-white">
<img class="w-full h-full object-cover" data-alt="Abstract friendly digital AI persona icon with soft glowing blue features and a warm smiling geometric expression" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCoWJozOi8diiSI6E4UrcEWbXxT6SX7L2jdW0X-3S8lFCuyi3JcnxkYL9udo0c9jUNbCrrt6wGUMeVUbbtJrSnpuwPc_LLzdePMZT0uUUIokLuRNAaga4EFNgEIafvX8eonnh45UV9ugZUbTvAnVpqLpJfsdyRVYm7J5Y8fsbqfYNZQrkYwqXoPtqsCWO2K6jc3C59TeEWgbsP777BuxyDRArBBYZRo9CzXRMEE3MEMOA_olkpgD7sZUnHniqlVRUbKqF42LpqeW1BO"/>
</div>
</div>
<div class="absolute -bottom-1 -right-1 w-8 h-8 bg-secondary rounded-full border-4 border-white flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-[18px] text-white" data-icon="auto_awesome" data-weight="fill" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
</div>
<div class="flex-1 space-y-3 text-center md:text-left">
<h1 class="font-headline-md text-headline-md text-on-surface">Hi there! I'm your learning companion.</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">To help me personalize your journey, tell me a bit about yourself.</p>
</div>
</section>
<!-- Onboarding Form -->
<div class="bg-white rounded-[2rem] p-8 md:p-10 soft-shadow space-y-10 border border-slate-100">
<!-- Basic Info -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
<div class="space-y-3">
<label class="font-label-sm text-label-sm text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-lg">person</span>
            Full Name
          </label>
<input id="userName" class="w-full h-14 px-5 rounded-2xl border border-outline-variant bg-surface-dim focus:bg-white focus:outline-none focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all duration-300" placeholder="Alex Johnson" type="text"/>
</div>
<div class="space-y-3">
<label class="font-label-sm text-label-sm text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-lg">cake</span>
            Age
          </label>
<input id="userAge" class="w-full h-14 px-5 rounded-2xl border border-outline-variant bg-surface-dim focus:bg-white focus:outline-none focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all duration-300" placeholder="21" type="number"/>
</div>
</div>
<!-- Hobbies Selectable Chips -->
<div class="space-y-5">
<label class="font-label-sm text-label-sm text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-lg">explore</span>
          My Hobbies
        </label>
<div class="flex flex-wrap gap-4" id="hobbiesContainer">
<button class="hobby-btn px-6 py-3 rounded-2xl border-2 border-primary bg-primary text-on-primary font-label-sm flex items-center gap-2 hover:shadow-lg hover:shadow-primary/20 hover:-translate-y-1 transition-all">
<span class="material-symbols-outlined text-base" data-icon="palette">palette</span> Painting
          </button>
<button class="hobby-btn px-6 py-3 rounded-2xl border border-outline-variant bg-white text-on-surface-variant font-label-sm flex items-center gap-2 hover:border-primary hover:text-primary transition-all">
<span class="material-symbols-outlined text-base" data-icon="code">code</span> Coding
          </button>
<button class="hobby-btn px-6 py-3 rounded-2xl border-2 border-secondary bg-secondary-container text-on-secondary-container font-label-sm flex items-center gap-2 hover:shadow-lg hover:shadow-secondary/20 hover:-translate-y-1 transition-all">
<span class="material-symbols-outlined text-base" data-icon="fitness_center">fitness_center</span> Sports
          </button>
<button class="hobby-btn px-6 py-3 rounded-2xl border border-outline-variant bg-white text-on-surface-variant font-label-sm flex items-center gap-2 hover:border-primary hover:text-primary transition-all">
<span class="material-symbols-outlined text-base" data-icon="menu_book">menu_book</span> Reading
          </button>
<button class="hobby-btn px-6 py-3 rounded-2xl border border-outline-variant bg-white text-on-surface-variant font-label-sm flex items-center gap-2 hover:border-primary hover:text-primary transition-all">
<span class="material-symbols-outlined text-base" data-icon="music_note">music_note</span> Music
          </button>
<button class="px-6 py-3 rounded-2xl border border-outline-variant bg-white text-on-surface-variant font-label-sm flex items-center gap-2 hover:border-primary hover:bg-primary-fixed transition-all">
<span class="material-symbols-outlined text-base" data-icon="add">add</span> More
          </button>
</div>
</div>
<!-- Favorites / Style Context -->
<div class="grid grid-cols-1 gap-6">
<div class="space-y-3">
<label class="font-label-sm text-label-sm text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-lg">auto_stories</span>
            Favorite Books &amp; Movies
            <span class="material-symbols-outlined text-slate-400 text-[16px] cursor-help" data-icon="info" title="Helps us understand your learning style">info</span>
</label>
<textarea id="userFavorites" class="w-full p-5 rounded-2xl border border-outline-variant bg-surface-dim focus:bg-white focus:outline-none focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all duration-300 resize-none" placeholder="I love 'Inception' and 'Sapiens'. I enjoy complex narratives and non-fiction science." rows="4"></textarea>
<div class="flex items-center gap-2 text-[12px] text-primary/70 font-label-sm">
<span class="material-symbols-outlined text-sm">tips_and_updates</span>
<span>This helps me understand if you're a visual thinker or prefer deep theory.</span>
</div>
</div>
</div>
<!-- Action Button -->
<div class="pt-6">
<button id="continueBtn" class="w-full custom-gradient-btn text-on-primary font-bold text-lg py-5 rounded-2xl flex items-center justify-center gap-3 hover:translate-y-[-4px] hover:shadow-2xl hover:shadow-primary/40 transition-all duration-300 active:scale-95 group">
          Continue to Next Step
          <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</div>
</main>
<!-- Decoration background elements -->
<div class="fixed top-20 right-[-10%] w-[50%] h-[50%] bg-indigo-200/40 rounded-full blur-[140px] -z-10"></div>
<div class="fixed bottom-0 left-[-5%] w-[40%] h-[40%] bg-emerald-100/40 rounded-full blur-[120px] -z-10"></div>
<div class="fixed top-[40%] left-[20%] w-[10%] h-[10%] bg-pink-100/30 rounded-full blur-[80px] -z-10"></div>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    // Handle hobby selection
    const hobbyBtns = document.querySelectorAll('.hobby-btn');
    const selectedHobbies = new Set(['Painting', 'Sports']); // Initial state based on CSS

    hobbyBtns.forEach(btn => {
      btn.addEventListener('click', (e) => {
        const text = e.currentTarget.innerText.trim().split('\n').pop().trim();
        if (selectedHobbies.has(text)) {
          selectedHobbies.delete(text);
          // Revert styles to unselected
          e.currentTarget.className = 'hobby-btn px-6 py-3 rounded-2xl border border-outline-variant bg-white text-on-surface-variant font-label-sm flex items-center gap-2 hover:border-primary hover:text-primary transition-all';
        } else {
          selectedHobbies.add(text);
          // Apply selected styles
          e.currentTarget.className = 'hobby-btn px-6 py-3 rounded-2xl border-2 border-primary bg-primary text-on-primary font-label-sm flex items-center gap-2 hover:shadow-lg hover:shadow-primary/20 hover:-translate-y-1 transition-all';
        }
      });
    });

    // Handle form submission
    document.getElementById('continueBtn').addEventListener('click', () => {
      const name = document.getElementById('userName').value;
      const age = document.getElementById('userAge').value;
      const favorites = document.getElementById('userFavorites').value;
      
      const userData = {
        name,
        age,
        hobbies: Array.from(selectedHobbies),
        favorites
      };

      console.log('User Data Captured:', userData);
      
      // Save locally for quick UI access
      localStorage.setItem('studyBuddyUserData', JSON.stringify(userData));
      
      // Send to backend
      fetch('/api/onboarding/step1', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(userData)
      })
      .then(response => response.json())
      .then(data => {
        if (data.success) {
          localStorage.setItem('studyBuddyUserId', data.userId);
          window.location.href = 'step2.html';
        } else {
          alert('Error saving data');
        }
      })
      .catch(error => {
        console.error('Error:', error);
        alert('Failed to connect to backend server');
      });
    });
  });
</script>
</body></html>
